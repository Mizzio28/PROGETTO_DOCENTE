<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Form Arbitro')}"></head>
<body>
<nav th:replace="~{fragments/layout :: adminNavbar}"></nav>
<div class="container py-4" style="max-width:480px">
  <div class="card shadow-sm mt-3">
    <div class="card-body">
      <h2 class="h4" th:text="${arbitro.id == null ? 'Nuovo Arbitro' : 'Modifica Arbitro'}"></h2>
      <form th:action="${arbitro.id == null ? '/admin/arbitri/nuovo' : '/admin/arbitri/' + arbitro.id + '/modifica'}"
            th:object="${arbitro}" method="post">
        <div class="mb-3"><label class="form-label">Nome</label>
          <input type="text" class="form-control" th:field="*{nome}" required/></div>
        <div class="mb-3"><label class="form-label">Cognome</label>
          <input type="text" class="form-control" th:field="*{cognome}" required/></div>
        <div class="mb-3"><label class="form-label">Codice Arbitrale</label>
          <input type="text" class="form-control" th:field="*{codiceArbitrale}" required/></div>
        <button type="submit" class="btn btn-primary">Salva</button>
        <a th:href="@{/admin/arbitri}" class="btn btn-secondary">Annulla</a>
      </form>
    </div>
  </div>
</div>
</body></html>
