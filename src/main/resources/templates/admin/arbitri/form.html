<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Nuovo Arbitro</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar"><a class="brand" th:href="@{/}">⚽ TorneoCalcio</a><a th:href="@{/admin}">Dashboard</a></nav>
<div class="container" style="max-width:480px">
  <div class="card" style="margin-top:32px">
    <h2>Nuovo Arbitro</h2>
    <form th:action="@{/admin/arbitri/nuovo}" th:object="${arbitro}" method="post">
      <div class="form-group"><label>Nome</label><input type="text" th:field="*{nome}" required/></div>
      <div class="form-group"><label>Cognome</label><input type="text" th:field="*{cognome}" required/></div>
      <div class="form-group"><label>Codice Arbitrale</label><input type="text" th:field="*{codiceArbitrale}" required/></div>
      <button type="submit" class="btn btn-primary">Salva</button>
      <a th:href="@{/admin}" class="btn btn-secondary">Annulla</a>
    </form>
  </div>
</div>
</body></html>
