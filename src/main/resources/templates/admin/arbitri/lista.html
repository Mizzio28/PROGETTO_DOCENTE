<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Admin Arbitri')}"></head>
<body>
<nav th:replace="~{fragments/layout :: adminNavbar}"></nav>
<div class="container py-4">
  <h1 class="mb-4">Gestione Arbitri</h1>
  <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>
  <a th:href="@{/admin/arbitri/nuovo}" class="btn btn-primary mb-3">+ Nuovo arbitro</a>
  <div class="table-responsive">
    <table class="table table-striped table-hover align-middle bg-white shadow-sm">
      <thead><tr><th>Cognome</th><th>Nome</th><th>Codice Arbitrale</th><th>Azioni</th></tr></thead>
      <tbody>
        <tr th:each="a : ${arbitri}">
          <td th:text="${a.cognome}"></td>
          <td th:text="${a.nome}"></td>
          <td th:text="${a.codiceArbitrale}"></td>
          <td>
            <a th:href="@{/admin/arbitri/{id}/modifica(id=${a.id})}" class="btn btn-primary btn-sm">Modifica</a>
            <form th:action="@{/admin/arbitri/{id}/elimina(id=${a.id})}" method="post" class="d-inline"
                  onsubmit="return confirm('Eliminare questo arbitro?')">
              <button type="submit" class="btn btn-danger btn-sm">Elimina</button>
            </form>
          </td>
        </tr>
        <tr th:if="${#lists.isEmpty(arbitri)}"><td colspan="4">Nessun arbitro registrato.</td></tr>
      </tbody>
    </table>
  </div>
</div>
</body></html>
