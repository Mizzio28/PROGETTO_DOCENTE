<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Admin Dashboard</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar">
  <a class="brand" th:href="@{/}">⚽ TorneoCalcio</a>
  <a th:href="@{/admin}">Dashboard</a>
  <a th:href="@{/admin/tornei}">Tornei</a>
  <a th:href="@{/admin/squadre}">Squadre</a>
  <a th:href="@{/admin/partite/nuova}">+ Partita</a>
  <a th:href="@{/admin/arbitri/nuovo}">+ Arbitro</a>
  <div class="nav-right">
    <form th:action="@{/logout}" method="post" style="display:inline">
      <button type="submit" class="btn btn-secondary">Logout</button>
    </form>
  </div>
</nav>
<div class="container">
  <h1>Dashboard Amministratore</h1>
  <div class="grid">
    <div class="card"><h3>Tornei</h3>
      <p th:text="${#lists.size(tornei)} + ' tornei registrati'"></p>
      <a th:href="@{/admin/tornei/nuovo}" class="btn btn-primary">+ Nuovo torneo</a>
    </div>
    <div class="card"><h3>Squadre</h3>
      <p th:text="${#lists.size(squadre)} + ' squadre registrate'"></p>
      <a th:href="@{/admin/squadre/nuova}" class="btn btn-primary">+ Nuova squadra</a>
    </div>
    <div class="card"><h3>Partite</h3>
      <a th:href="@{/admin/partite/nuova}" class="btn btn-primary">+ Registra partita</a>
    </div>
    <div class="card"><h3>Arbitri</h3>
      <a th:href="@{/admin/arbitri/nuovo}" class="btn btn-primary">+ Nuovo arbitro</a>
    </div>
  </div>
</div>
</body></html>
