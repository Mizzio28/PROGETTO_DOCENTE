<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Inserisci Risultato')}"></head>
<body>
<nav th:replace="~{fragments/layout :: adminNavbar}"></nav>
<div class="container py-4" style="max-width:480px">
  <div class="card shadow-sm mt-3">
    <div class="card-body">
      <h2 class="h4">Inserisci Risultato</h2>
      <p><strong th:text="${partita.squadraHome.nome}"></strong> vs <strong th:text="${partita.squadraAway.nome}"></strong></p>
      <p class="text-muted" th:text="${#temporals.format(partita.dataOra,'dd/MM/yyyy HH:mm')} + ' - ' + partita.luogo"></p>
      <form th:action="@{/admin/partite/{id}/risultato(id=${partita.id})}" method="post">
        <div class="mb-3"><label class="form-label" th:text="'Goal ' + partita.squadraHome.nome"></label>
          <input type="number" name="goalsHome" class="form-control" min="0"
                 th:value="${partita.goalsHome != null ? partita.goalsHome : 0}" required/></div>
        <div class="mb-3"><label class="form-label" th:text="'Goal ' + partita.squadraAway.nome"></label>
          <input type="number" name="goalsAway" class="form-control" min="0"
                 th:value="${partita.goalsAway != null ? partita.goalsAway : 0}" required/></div>
        <button type="submit" class="btn btn-primary">Salva risultato</button>
        <a th:href="@{/admin/partite}" class="btn btn-secondary">Annulla</a>
      </form>
    </div>
  </div>
</div>
</body></html>
