<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Form Squadra</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar"><a class="brand" th:href="@{/}">⚽ TorneoCalcio</a><a th:href="@{/admin}">Dashboard</a></nav>
<div class="container" style="max-width:560px">
  <div class="card" style="margin-top:32px">
    <h2 th:text="${squadra.id == null ? 'Nuova Squadra' : 'Modifica Squadra'}"></h2>
    <form th:action="${squadra.id == null ? '/admin/squadre/nuova' : '/admin/squadre/' + squadra.id + '/modifica'}"
          th:object="${squadra}" method="post">
      <div class="form-group"><label>Nome</label><input type="text" th:field="*{nome}" required/></div>
      <div class="form-group"><label>Città</label><input type="text" th:field="*{citta}" required/></div>
      <div class="form-group"><label>Anno Fondazione</label><input type="number" th:field="*{annoFondazione}" required/></div>
      <button type="submit" class="btn btn-primary">Salva</button>
      <a th:href="@{/admin/squadre}" class="btn btn-secondary">Annulla</a>
    </form>
  </div>
</div>
</body></html>
