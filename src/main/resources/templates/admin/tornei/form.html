<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Form Torneo</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar"><a class="brand" th:href="@{/}">⚽ TorneoCalcio</a><a th:href="@{/admin}">Dashboard</a></nav>
<div class="container" style="max-width:560px">
  <div class="card" style="margin-top:32px">
    <h2 th:text="${torneo.id == null ? 'Nuovo Torneo' : 'Modifica Torneo'}"></h2>
    <form th:action="${torneo.id == null ? '/admin/tornei/nuovo' : '/admin/tornei/' + torneo.id + '/modifica'}"
          th:object="${torneo}" method="post">
      <div class="form-group"><label>Nome</label>
        <input type="text" th:field="*{nome}" required/></div>
      <div class="form-group"><label>Anno</label>
        <input type="number" th:field="*{anno}" required/></div>
      <div class="form-group"><label>Descrizione</label>
        <textarea th:field="*{descrizione}" rows="3"></textarea></div>
      <button type="submit" class="btn btn-primary">Salva</button>
      <a th:href="@{/admin/tornei}" class="btn btn-secondary">Annulla</a>
    </form>
  </div>
</div>
</body></html>
