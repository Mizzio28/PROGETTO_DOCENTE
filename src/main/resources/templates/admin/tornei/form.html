<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Form Torneo')}"></head>
<body>
<nav th:replace="~{fragments/layout :: adminNavbar}"></nav>
<div class="container py-4" style="max-width:560px">
  <div class="card shadow-sm mt-3">
    <div class="card-body">
      <h2 class="h4" th:text="${torneo.id == null ? 'Nuovo Torneo' : 'Modifica Torneo'}"></h2>
      <form th:action="${torneo.id == null ? '/admin/tornei/nuovo' : '/admin/tornei/' + torneo.id + '/modifica'}"
            th:object="${torneo}" method="post">
        <div class="mb-3"><label class="form-label">Nome</label>
          <input type="text" class="form-control" th:field="*{nome}" required/></div>
        <div class="mb-3"><label class="form-label">Anno</label>
          <input type="number" class="form-control" th:field="*{anno}" required/></div>
        <div class="mb-3"><label class="form-label">Descrizione</label>
          <textarea class="form-control" th:field="*{descrizione}" rows="3"></textarea></div>
        <button type="submit" class="btn btn-primary">Salva</button>
        <a th:href="@{/admin/tornei}" class="btn btn-secondary">Annulla</a>
      </form>
    </div>
  </div>
</div>
</body></html>
