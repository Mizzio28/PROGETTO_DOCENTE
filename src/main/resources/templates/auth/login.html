<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Login')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-5" style="max-width:420px">
  <div class="card shadow-sm">
    <div class="card-body">
      <h2 class="h4 mb-3">Accedi</h2>
      <div class="alert alert-danger" th:if="${param.error}">Username o password non corretti.</div>
      <form th:action="@{/login}" method="post">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" required autofocus/>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required/>
        </div>
        <button type="submit" class="btn btn-primary w-100">Accedi</button>
      </form>
      <p class="mt-3 mb-0">Non hai un account? <a th:href="@{/register}">Registrati</a></p>
    </div>
  </div>
</div>
</body></html>
