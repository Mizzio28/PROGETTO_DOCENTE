<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Login</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar"><a class="brand" th:href="@{/}">⚽ TorneoCalcio</a></nav>
<div class="container" style="max-width:420px">
  <div class="card" style="margin-top:48px">
    <h2>Accedi</h2>
    <div class="alert-error" th:if="${param.error}">Username o password non corretti.</div>
    <form th:action="@{/login}" method="post">
      <div class="form-group">
        <label>Username</label>
        <input type="text" name="username" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required/>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Accedi</button>
    </form>
    <p style="margin-top:12px">Non hai un account? <a th:href="@{/register}">Registrati</a></p>
  </div>
</div>
</body></html>
