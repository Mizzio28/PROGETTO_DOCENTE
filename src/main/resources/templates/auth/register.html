<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Registrazione')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-5" style="max-width:480px">
  <div class="card shadow-sm">
    <div class="card-body">
      <h2 class="h4 mb-3">Registrazione</h2>
      <div class="alert alert-danger" th:if="${usernameError}" th:text="${usernameError}"></div>
      <form th:action="@{/register}" method="post">
        <div class="mb-3"><label class="form-label">Nome</label>
          <input type="text" name="name" class="form-control" th:value="${user.name}" required/></div>
        <div class="mb-3"><label class="form-label">Cognome</label>
          <input type="text" name="surname" class="form-control" th:value="${user.surname}" required/></div>
        <div class="mb-3"><label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" th:value="${user.email}" required/></div>
        <div class="mb-3"><label class="form-label">Username</label>
          <input type="text" name="username" class="form-control" th:value="${credentials.username}" required/></div>
        <div class="mb-3"><label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" required/></div>
        <button type="submit" class="btn btn-primary w-100">Registrati</button>
      </form>
      <p class="mt-3 mb-0">Hai già un account? <a th:href="@{/login}">Accedi</a></p>
    </div>
  </div>
</div>
</body></html>
