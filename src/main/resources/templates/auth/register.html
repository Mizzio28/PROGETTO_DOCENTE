<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Registrazione</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar"><a class="brand" th:href="@{/}">⚽ TorneoCalcio</a></nav>
<div class="container" style="max-width:480px">
  <div class="card" style="margin-top:48px">
    <h2>Registrazione</h2>
    <div class="alert-error" th:if="${usernameError}" th:text="${usernameError}"></div>
    <form th:action="@{/register}" method="post">
      <div class="form-group"><label>Nome</label>
        <input type="text" name="name" th:value="${user.name}" required/></div>
      <div class="form-group"><label>Cognome</label>
        <input type="text" name="surname" th:value="${user.surname}" required/></div>
      <div class="form-group"><label>Email</label>
        <input type="email" name="email" th:value="${user.email}" required/></div>
      <div class="form-group"><label>Username</label>
        <input type="text" name="username" th:value="${credentials.username}" required/></div>
      <div class="form-group"><label>Password</label>
        <input type="password" name="password" required/></div>
      <button type="submit" class="btn btn-primary" style="width:100%">Registrati</button>
    </form>
    <p style="margin-top:12px">Hai già un account? <a th:href="@{/login}">Accedi</a></p>
  </div>
</div>
</body></html>
