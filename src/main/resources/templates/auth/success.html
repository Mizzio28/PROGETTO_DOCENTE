<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Login effettuato')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-4">
  <div class="card shadow-sm mx-auto mt-4" style="max-width:480px">
    <div class="card-body text-center">
      <h2 class="h4">Bentornato, <span th:text="${user != null ? user.name : username}"></span>!</h2>
      <p class="my-3">Sei autenticato come <strong th:text="${username}"></strong>.</p>
      <a th:href="@{/tornei}" class="btn btn-primary">Vai ai tornei</a>
    </div>
  </div>
</div>
</body></html>
