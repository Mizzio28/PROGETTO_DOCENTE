<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Login effettuato</title><link rel="stylesheet" th:href="@{/css/style.css}"></head>
<body>
<nav class="navbar"><a class="brand" th:href="@{/}">⚽ TorneoCalcio</a>
  <div class="nav-right">
    <form th:action="@{/logout}" method="post">
      <button type="submit" class="btn btn-secondary">Logout</button>
    </form>
  </div>
</nav>
<div class="container">
  <div class="card" style="margin-top:48px; text-align:center">
    <h2>Bentornato, <span th:text="${user != null ? user.name : username}"></span>!</h2>
    <p style="margin:16px 0">Sei autenticato come <strong th:text="${username}"></strong>.</p>
    <a th:href="@{/tornei}" class="btn btn-primary">Vai ai tornei</a>
  </div>
</div>
</body></html>
