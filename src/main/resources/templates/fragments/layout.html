<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head>
<meta charset="UTF-8"/>
</head>
<body>

<head th:fragment="head(title)">
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="_csrf" th:content="${_csrf.token}"/>
  <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
  <title th:text="${title} + ' - TorneoCalcio'">TorneoCalcio</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark brand-navbar">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/}">⚽ TorneoCalcio</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMain">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" th:href="@{/tornei}">Tornei</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/analisi}">Analisi</a></li>
      </ul>
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
        <li class="nav-item" sec:authorize="isAuthenticated()">
          <span class="navbar-text text-white-50 me-lg-2" sec:authentication="name"></span>
        </li>
        <li class="nav-item" sec:authorize="isAuthenticated()">
          <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-light btn-sm my-1">Logout</button>
          </form>
        </li>
        <li class="nav-item" sec:authorize="isAnonymous()">
          <a th:href="@{/login}" class="btn btn-light btn-sm my-1 me-lg-2">Login</a>
        </li>
        <li class="nav-item" sec:authorize="isAnonymous()">
          <a th:href="@{/register}" class="btn btn-outline-light btn-sm my-1">Registrati</a>
        </li>
        <li class="nav-item" sec:authorize="hasAuthority('ADMIN')">
          <a th:href="@{/admin}" class="btn btn-danger btn-sm my-1 ms-lg-2">Admin</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<nav th:fragment="adminNavbar" class="navbar navbar-expand-lg navbar-dark brand-navbar">
  <div class="container">
    <a class="navbar-brand fw-bold" th:href="@{/}">⚽ TorneoCalcio</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navAdmin">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navAdmin">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" th:href="@{/admin}">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/tornei}">Tornei</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/squadre}">Squadre</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/partite}">Partite</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/admin/arbitri}">Arbitri</a></li>
      </ul>
      <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
        <li class="nav-item"><a class="nav-link" th:href="@{/}">⟵ Sito pubblico</a></li>
        <li class="nav-item">
          <form th:action="@{/logout}" method="post" class="d-inline">
            <button type="submit" class="btn btn-outline-light btn-sm my-1">Logout</button>
          </form>
        </li>
      </ul>
    </div>
  </div>
</nav>

</body>
</html>
