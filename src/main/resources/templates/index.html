<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{fragments/layout :: head(title='Home')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="hero text-center">
  <div class="container">
    <h1 class="display-5 fw-bold">⚽ TorneoCalcio</h1>
    <p class="lead">Segui i tornei, le squadre e i risultati della tua città, partita dopo partita.</p>
    <div class="mt-4">
      <a th:href="@{/tornei}" class="btn btn-light btn-lg me-2">Scopri i tornei</a>
      <a sec:authorize="isAnonymous()" th:href="@{/register}" class="btn btn-outline-light btn-lg">Registrati</a>
    </div>
  </div>
</div>

<div class="container">
  <h2 class="mb-4">Tornei recenti</h2>
  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    <div class="col" th:each="torneo : ${tornei}">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h3 class="card-title h5" th:text="${torneo.nome}"></h3>
          <p class="card-text text-muted" th:text="${torneo.anno}"></p>
          <a th:href="@{/tornei/{id}(id=${torneo.id})}" class="btn btn-primary">Vai al torneo</a>
        </div>
      </div>
    </div>
    <div class="col" th:if="${#lists.isEmpty(tornei)}"><p>Nessun torneo disponibile.</p></div>
  </div>
</div>
</body></html>
