<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{fragments/layout :: head(title='Partita')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-4">
  <h1 class="mb-3">Partita: <span th:text="${partita.squadraHome.nome}"></span> vs <span th:text="${partita.squadraAway.nome}"></span></h1>
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <p><strong>Data:</strong> <span th:text="${#temporals.format(partita.dataOra,'dd/MM/yyyy HH:mm')}"></span></p>
      <p><strong>Luogo:</strong> <span th:text="${partita.luogo}"></span></p>
      <p><strong>Stato:</strong> <span th:text="${partita.stato}"></span></p>
      <p th:if="${partita.stato.name() == 'PLAYED'}">
        <strong>Risultato:</strong> <span th:text="${partita.goalsHome}"></span> - <span th:text="${partita.goalsAway}"></span>
      </p>
      <p class="mb-0"><strong>Arbitro:</strong> <span th:text="${partita.arbitro.cognome + ' ' + partita.arbitro.nome}"></span></p>
    </div>
  </div>

  <h2 class="mb-3">Commenti</h2>
  <div sec:authorize="isAnonymous()">
    <p><a th:href="@{/login}">Accedi</a> per vedere e aggiungere commenti.</p>
  </div>
  <div sec:authorize="isAuthenticated()">
    <div class="card shadow-sm mb-3" th:each="c : ${partita.commenti}">
      <div class="card-body">
        <p class="mb-1"><strong th:text="${c.autore.name + ' ' + c.autore.surname}"></strong>
           <small class="text-muted" th:text="${#temporals.format(c.dataCommento,'dd/MM/yyyy HH:mm')}"></small></p>
        <p th:text="${c.testo}"></p>
        <a th:if="${currentUserEmail != null and currentUserEmail == c.autore.email}"
           th:href="@{/commenti/{id}/modifica(id=${c.id})}" class="btn btn-secondary btn-sm">Modifica</a>
      </div>
    </div>
    <div th:if="${#lists.isEmpty(partita.commenti)}"><p>Nessun commento.</p></div>
    <div class="card shadow-sm mt-3">
      <div class="card-body">
        <h3 class="h5">Aggiungi un commento</h3>
        <form th:action="@{/partite/{id}/commenti(id=${partita.id})}" method="post">
          <div class="mb-3">
            <textarea name="testo" class="form-control" rows="3" placeholder="Scrivi il tuo commento..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary">Invia</button>
        </form>
      </div>
    </div>
  </div>
</div>
</body></html>
