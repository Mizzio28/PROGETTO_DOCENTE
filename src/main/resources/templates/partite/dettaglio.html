<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{fragments/layout :: head(title='Partita')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-4">
  <h1 class="mb-3">Partita: <span th:text="${partita.squadraHome.nome}"></span> vs <span th:text="${partita.squadraAway.nome}"></span></h1>
  <div class="card shadow-sm mb-4">
    <div class="card-body">
      <p><strong>Data:</strong> <span th:text="${#temporals.format(partita.dataOra,'dd/MM/yyyy HH:mm')}"></span></p>
      <p><strong>Luogo:</strong> <span th:text="${partita.luogo}"></span></p>
      <p><strong>Stato:</strong> <span th:text="${partita.stato}"></span></p>
      <p th:if="${partita.stato.name() == 'PLAYED'}">
        <strong>Risultato:</strong> <span th:text="${partita.goalsHome}"></span> - <span th:text="${partita.goalsAway}"></span>
      </p>
      <p class="mb-0"><strong>Arbitro:</strong> <span th:text="${partita.arbitro.cognome + ' ' + partita.arbitro.nome}"></span></p>
    </div>
  </div>

  <h2 class="mb-3">Commenti</h2>
  <div sec:authorize="isAnonymous()">
    <p><a th:href="@{/login}">Accedi</a> per vedere e aggiungere commenti.</p>
  </div>
  <div sec:authorize="isAuthenticated()">
    <div id="commenti-root"
         th:attr="data-partita-id=${partita.id}, data-user-email=${currentUserEmail}">
    </div>
    <script src="/react/commenti/commenti.js"></script>
  </div>
</div>
</body></html>
