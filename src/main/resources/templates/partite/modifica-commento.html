<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Modifica commento')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-4" style="max-width:600px">
  <div class="card shadow-sm mt-3">
    <div class="card-body">
      <h2 class="h4">Modifica commento</h2>
      <form th:action="@{/commenti/{id}/modifica(id=${commento.id})}" method="post">
        <input type="hidden" name="partitaId" th:value="${commento.partita.id}"/>
        <div class="mb-3">
          <label class="form-label">Testo</label>
          <textarea name="testo" class="form-control" rows="4" required th:text="${commento.testo}"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Salva</button>
        <a th:href="@{/partite/{id}(id=${commento.partita.id})}" class="btn btn-secondary">Annulla</a>
      </form>
    </div>
  </div>
</div>
</body></html>
