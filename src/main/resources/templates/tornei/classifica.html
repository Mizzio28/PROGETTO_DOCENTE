<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Classifica')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-4">
  <h1>Classifica: <span th:text="${torneo.nome}"></span></h1>
  <p class="text-muted fst-italic">La classifica viene calcolata dinamicamente: 3 pt vittoria, 1 pt pareggio.</p>
  <div class="table-responsive">
    <table class="table table-striped table-hover align-middle bg-white shadow-sm classifica-table">
      <thead><tr><th>Squadra Home</th><th>Goal Home</th><th>Goal Away</th><th>Squadra Away</th><th>Data</th></tr></thead>
      <tbody>
        <tr th:each="p : ${partite}" th:if="${p.stato.name() == 'PLAYED'}">
          <td th:text="${p.squadraHome.nome}"></td>
          <td th:text="${p.goalsHome}"></td>
          <td th:text="${p.goalsAway}"></td>
          <td th:text="${p.squadraAway.nome}"></td>
          <td th:text="${#temporals.format(p.dataOra,'dd/MM/yyyy')}"></td>
        </tr>
      </tbody>
    </table>
  </div>
  <a th:href="@{/tornei/{id}(id=${torneo.id})}" class="btn btn-secondary mt-3">Torna al torneo</a>
</div>
</body></html>
