<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head(title='Classifica')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-4">
  <h1>Classifica: <span th:text="${torneo.nome}"></span></h1>
  <p class="text-muted fst-italic">3 punti per vittoria, 1 punto per pareggio.</p>
  <div class="table-responsive">
    <table class="table table-striped table-hover align-middle bg-white shadow-sm classifica-table">
      <thead>
        <tr>
          <th>#</th><th>Squadra</th><th>Pt</th><th>V</th><th>N</th><th>P</th><th>GF</th><th>GS</th><th>DR</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="riga, iter : ${classifica}" th:classappend="${iter.index == 0} ? 'leader'">
          <td th:text="${iter.count}"></td>
          <td th:text="${riga.squadra.nome}"></td>
          <td th:text="${riga.punti}"></td>
          <td th:text="${riga.vittorie}"></td>
          <td th:text="${riga.pareggi}"></td>
          <td th:text="${riga.sconfitte}"></td>
          <td th:text="${riga.golFatti}"></td>
          <td th:text="${riga.golSubiti}"></td>
          <td th:text="${riga.differenzaReti}"></td>
        </tr>
        <tr th:if="${#lists.isEmpty(classifica)}"><td colspan="9">Nessuna squadra nel torneo.</td></tr>
      </tbody>
    </table>
  </div>
  <a th:href="@{/tornei/{id}(id=${torneo.id})}" class="btn btn-secondary mt-3">Torna al torneo</a>
</div>
</body></html>
