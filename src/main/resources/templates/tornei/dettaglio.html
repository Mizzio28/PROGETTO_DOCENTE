<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{fragments/layout :: head(title=${torneo.nome})}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-4">
  <h1 th:text="${torneo.nome}"></h1>
  <p><strong>Anno:</strong> <span th:text="${torneo.anno}"></span></p>
  <p th:text="${torneo.descrizione}"></p>

  <div class="mb-4">
    <a th:href="@{/tornei/{id}/classifica(id=${torneo.id})}" class="btn btn-primary">Classifica</a>
  </div>

  <h2 class="mb-3">Squadre partecipanti</h2>
  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4 mb-4">
    <div class="col" th:each="s : ${torneo.squadre}">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h3 class="card-title h5" th:text="${s.nome}"></h3>
          <p class="card-text text-muted"><span th:text="${s.citta}"></span> - fondata <span th:text="${s.annoFondazione}"></span></p>
          <a th:href="@{/squadre/{id}(id=${s.id})}" class="btn btn-primary">Vedi rosa</a>
        </div>
      </div>
    </div>
    <p class="col" th:if="${#lists.isEmpty(torneo.squadre)}">Nessuna squadra registrata.</p>
  </div>

  <h2 class="mb-3">Calendario partite</h2>
  <div class="table-responsive">
    <table class="table table-striped table-hover align-middle bg-white shadow-sm">
      <thead><tr><th>Data/Ora</th><th>Luogo</th><th>Home</th><th>Away</th><th>Risultato</th><th>Stato</th><th></th></tr></thead>
      <tbody>
        <tr th:each="p : ${partite}">
          <td th:text="${#temporals.format(p.dataOra,'dd/MM/yyyy HH:mm')}"></td>
          <td th:text="${p.luogo}"></td>
          <td th:text="${p.squadraHome.nome}"></td>
          <td th:text="${p.squadraAway.nome}"></td>
          <td th:text="${p.stato.name() == 'PLAYED' ? p.goalsHome + ' - ' + p.goalsAway : '-'}"></td>
          <td><span class="badge" th:classappend="${p.stato.name() == 'PLAYED' ? 'text-bg-success' : (p.stato.name() == 'CANCELLED' ? 'text-bg-secondary' : 'text-bg-info')}" th:text="${p.stato}"></span></td>
          <td><a th:href="@{/partite/{id}(id=${p.id})}" class="btn btn-secondary btn-sm">Dettaglio</a></td>
        </tr>
        <tr th:if="${#lists.isEmpty(partite)}"><td colspan="7">Nessuna partita.</td></tr>
      </tbody>
    </table>
  </div>
</div>
</body></html>
