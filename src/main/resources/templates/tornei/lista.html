<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{fragments/layout :: head(title='Tornei')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container py-4">
  <h1 class="mb-4">Tornei di Calcio</h1>
  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 g-4">
    <div class="col" th:each="t : ${tornei}">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h3 class="card-title h5" th:text="${t.nome}"></h3>
          <p class="card-text mb-1"><strong>Anno:</strong> <span th:text="${t.anno}"></span></p>
          <p class="card-text text-muted" th:text="${t.descrizione}"></p>
          <a th:href="@{/tornei/{id}(id=${t.id})}" class="btn btn-primary mt-2">Dettaglio</a>
        </div>
      </div>
    </div>
    <p class="col" th:if="${#lists.isEmpty(tornei)}">Nessun torneo.</p>
  </div>
</div>
</body></html>
